[graph]
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071 (Marvin attack on `rsa`): pulled transitively by the
# optional `sqlx-mysql` driver for caching_sha2_password authentication. No
# fixed release of `rsa` exists. The crate is used client side to encrypt the
# password once during the MySQL handshake, not as a repeatable decryption
# oracle, and the transport is secured via TLS. Revisit when RustCrypto ships
# a constant-time fix.
ignore = ["RUSTSEC-2023-0071"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
