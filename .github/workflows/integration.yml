name: Integration tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  integration:
    name: Integration tests on Linux with Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2
        with:
          key: integration

      - name: Verify Docker daemon is available
        run: docker version

      - name: Run #[ignore]-d integration tests
        run: cargo test --workspace --all-features -- --ignored --test-threads=1

      - name: Run self-asserting examples
        run: |
          cargo run --example 01_command_handler   -p hexeract-examples
          cargo run --example 02_outbox_transactional -p hexeract-examples
          cargo run --example 03_bus_pubsub          -p hexeract-examples
          cargo run --example 04_bus_mediator        -p hexeract-examples
          cargo run --example 05_orders_to_payments  -p hexeract-examples
